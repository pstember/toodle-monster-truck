name: Deploy GitHub Pages

on:
  push:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: puzzle/package-lock.json

      - name: Install and build puzzle
        working-directory: puzzle
        env:
          VITE_BASE: /${{ github.event.repository.name }}/puzzle/
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/truck _site/puzzle
          cp index.html _site/
          rsync -a --exclude node_modules --exclude test-results --exclude playwright-report --exclude coverage --exclude .git truck/ _site/truck/
          cp -R puzzle/dist/. _site/puzzle/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
