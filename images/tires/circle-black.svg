<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer tire (dark rubber) -->
  <circle cx="60" cy="60" r="55" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Tread pattern -->
  <circle cx="60" cy="60" r="45" fill="#1a1a1a" opacity="0.5"/>

  <!-- Center rim (black with metallic shine) -->
  <circle cx="60" cy="60" r="22" fill="#1a1a1a"/>
  <circle cx="60" cy="60" r="22" fill="url(#gradblack)"/>

  <!-- Center hub -->
  <circle cx="60" cy="60" r="7" fill="#0a0a0a"/>
  <circle cx="60" cy="60" r="5" fill="#2a2a2a"/>

  <!-- Shine/highlight -->
  <ellipse cx="52" cy="52" rx="10" ry="6" fill="#ffffff" opacity="0.2"/>

  <defs>
    <radialGradient id="gradblack">
      <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
  </defs>
</svg>
