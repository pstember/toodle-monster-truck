<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1e3a5f">
  <title>Toddler Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      min-height: 100%;
      min-height: 100dvh;
      background: linear-gradient(165deg, #1e3a5f 0%, #0f766e 35%, #bfdbfe 65%, #ffedd5 100%);
      font-family: 'Fredoka', 'Segoe UI', system-ui, sans-serif;
      color: #1e3a5f;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 28px;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 0 rgba(15, 23, 42, 0.25);
    }
    .grid {
      display: grid;
      gap: 20px;
      width: 100%;
      max-width: 420px;
    }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: linear-gradient(180deg, #fff 0%, #e0f2fe 100%);
      border-radius: 24px;
      padding: 28px 24px;
      border: 4px solid #fff;
      box-shadow: 0 8px 0 rgba(30, 58, 95, 0.15), 0 0 0 2px rgba(30, 64, 175, 0.12);
      transition: transform 0.1s ease, filter 0.15s ease;
      text-align: center;
    }
    a.card:active { transform: translateY(3px); }
    a.card:hover { filter: brightness(1.03); }
    .card__icon { font-size: 3rem; line-height: 1; margin-bottom: 12px; }
    .card__title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0f172a;
    }
    .card__desc {
      font-size: 0.95rem;
      color: #334e68;
      line-height: 1.35;
    }
    .card--truck .card__title { color: #c2410c; }
    .card--puzzle .card__title { color: #15803d; }
  </style>
</head>
<body>
  <h1>Pick a game</h1>
  <nav class="grid" aria-label="Games">
    <a class="card card--truck" href="truck/">
      <div class="card__icon" aria-hidden="true">🚙</div>
      <div class="card__title">Monster Truck Match</div>
      <div class="card__desc">Drag shapes and colors onto the truck. Made for tiny fingers.</div>
    </a>
    <a class="card card--puzzle" href="puzzle/">
      <div class="card__icon" aria-hidden="true">🧩</div>
      <div class="card__title">Photo puzzle</div>
      <div class="card__desc">Jigsaw puzzle with your own photos. Voronoi pieces and gentle hints.</div>
    </a>
  </nav>
</body>
</html>
